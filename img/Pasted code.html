// ─── PAGE NAV ─────────────────────────
function openProvince(key){
  const d = travelDB[key];
  if(!d) return;

  document.getElementById('pvHeroImg').src = d.heroImg;
  document.getElementById('pvLabel').textContent = d.region;
  document.getElementById('pvTitle').textContent = d.label;
  document.getElementById('pvSub').textContent = d.sub;
  document.getElementById('pvNavTitle').textContent = d.label;
  document.getElementById('pvMap').src = d.mapSrc;
  document.getElementById('pvSpotsH').textContent = d.label + '-ын үзэсгэлэнт газрууд';
  document.getElementById('pvResortsH').textContent = d.label + '-ын амралтын газрууд';
  document.getElementById('pvNavAuth').innerHTML = document.getElementById('navAuth').innerHTML;

  document.getElementById('pvSpots').innerHTML = d.spots.map(s => `
    <div class="spot-card">
      <img src="${s.img}" alt="${s.name}">
      <div class="spot-body">
        <div class="spot-name">${s.name}</div>
        <div class="spot-desc">${s.desc}</div>
        <div class="spot-tags">
          ${(s.tags || []).map(tag => `<span class="spot-tag">${tag}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('pvResorts').innerHTML = d.resorts.map((r, i) => `
    <div class="resort-card">
      <div class="resort-img-w">
        <img src="${r.img}" alt="${r.name}">
        <span class="resort-rating">${r.rating}</span>
      </div>
      <div class="resort-body">
        <div class="resort-region">${r.region}</div>
        <div class="resort-name">${r.name}</div>
        <div class="resort-info-row">📞 <span>${r.phone}</span></div>
        <div class="resort-info-row">📧 <span>${r.email}</span></div>
        <div class="resort-feats">${(r.feats || []).map(f => `<span class="resort-feat">${f}</span>`).join('')}</div>
        <div class="resort-foot">
          <div class="resort-price">${r.price}<small>/ ${r.unit}</small></div>
          <div style="display:flex;gap:8px;">
            <button class="btn-ghost" style="padding:8px 13px;font-size:12px;" onclick="openRD('${key}', ${i})">Дэлгэрэнгүй</button>
            <button class="btn-book" onclick="openBk('${r.name}', ${r.priceNum})">Захиалах</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  const pg = document.getElementById('provincePage');
  pg.classList.add('active');
  pg.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  setTimeout(() => {
    document.body.style.overflow = '';
    pg.style.overflowY = 'auto';
  }, 460);
}

function goHome(){
  document.getElementById('provincePage').classList.remove('active');
  document.body.style.overflow='';
}
function scrollToId(id){ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth'}); }

// ─── RESORT DETAIL ─────────────────────
function openRD(pk, idx){
  const r = travelDB[pk].resorts[idx];
  document.getElementById('rdImg').src = r.img;
  document.getElementById('rdRegion').textContent = r.region;
  document.getElementById('rdTitle').textContent = r.name;
  document.getElementById('rdLoc').textContent = '📍 ' + r.region + ', ' + travelDB[pk].label;
  document.getElementById('rdPrice').textContent = r.price + ' / ' + r.unit;
  document.getElementById('rdRating').textContent = r.rating;
  document.getElementById('rdPhone').textContent = r.phone;
  document.getElementById('rdEmail').textContent = r.email;
  document.getElementById('rdFeats').innerHTML = (r.feats || []).map(f => `<span class="resort-feat">${f}</span>`).join('');
  document.getElementById('rdDesc').textContent = r.desc;
  document.getElementById('rdBkBtn').onclick = () => {
    closeModal('rdModal');
    openBk(r.name, r.priceNum);
  };
  openModal('rdModal');
}

// ─── SEARCH ────────────────────────────
function handleSearch(){
  const v=document.getElementById('srchAimag').value;
  if(!v){ showToast('Аймаг сонгоно уу'); return; }
  openProvince(v);
}
// ─── festival ────────────────────────────
function scrollFest(direction){
  const row = document.getElementById('festRow');

  const scrollAmount = 300; // хэдэн px гүйлгэх

  row.scrollBy({
    left: direction * scrollAmount,
    behavior: 'smooth'
  });
}

// ─── MODALS ────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-ov').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));

// ─── AUTH ──────────────────────────────
function switchTab(t){
  const li=document.getElementById('loginTab'),re=document.getElementById('registerTab');
  const lf=document.getElementById('loginForm'),rf=document.getElementById('registerForm');
  if(t==='login'){ li.classList.add('active');re.classList.remove('active');lf.style.display='block';rf.style.display='none';document.getElementById('authTitle').textContent='Нэвтрэх'; }
  else{ re.classList.add('active');li.classList.remove('active');rf.style.display='block';lf.style.display='none';document.getElementById('authTitle').textContent='Бүртгүүлэх'; }
}
function handleLogin(){ user={name:'Аялагч',email:document.getElementById('liEmail').value||'user@jim.mn'}; closeModal('authModal'); updateNav(); showToast('Амжилттай нэвтэрлээ! 👋'); }
function handleRegister(){ user={name:document.getElementById('regName').value||'Хэрэглэгч',email:document.getElementById('regEmail').value||'user@jim.mn'}; closeModal('authModal'); updateNav(); showToast('Бүртгэл амжилттай! 🎉'); }
function handleLogout(){ user=null; closePP(); updateNav(); showToast('Гарлаа. Дараа уулзъя! 👋'); }

function updateNav(){
  const html=user?`<button onclick="openPP()" style="display:flex;align-items:center;gap:9px;background:var(--dark3);border:1px solid var(--border);border-radius:50px;padding:7px 15px;cursor:pointer;color:var(--text);font-family:'Comfortaa',sans-serif;font-size:13px;"><span style="width:26px;height:26px;border-radius:50%;background:var(--gold);color:var(--dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;">${user.name.charAt(0).toUpperCase()}</span>${user.name}</button>`
    :`<button class="btn-ghost" onclick="openModal('authModal');switchTab('login')">Нэвтрэх</button><button class="btn-gold" onclick="openModal('authModal');switchTab('register')">Бүртгүүлэх</button>`;
  document.getElementById('navAuth').innerHTML=html;
  document.getElementById('pvNavAuth').innerHTML=html;
}

// ─── PROFILE ───────────────────────────
function openPP(){
  if(!user){
    openModal('authModal');
    return;
  }

  document.getElementById('ppName').textContent = user.name;
  document.getElementById('ppEmail').textContent = user.email;
  document.getElementById('ppAv').textContent = user.name.charAt(0).toUpperCase();
  renderBks();

  document.getElementById('pp').classList.add('open');
  document.getElementById('ppOv').classList.add('open');
  document.body.style.overflow = 'hidden';
}


function renderBks(){

  if(!bookings.length){
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Захиалга байхгүй байна.</p>';
    return;
  }

  el.innerHTML = bookings.map((b, index) => `
    <div class="bk-item">
      <div class="bk-item-n">${b.camp}</div>
      <div class="bk-item-d">${b.date}</div>
      ${b.days ? `<div class="bk-item-d">${b.days} хоног</div>` : ''}
      ${b.pax ? `<div class="bk-item-d">${b.pax}</div>` : ''}
      ${b.total ? `<div class="bk-item-d">Нийт: ₮${Number(b.total).toLocaleString()}</div>` : ''}
      <span class="bk-status">✓ Баталгаажсан</span>

      <div style="margin-top:10px;display:flex;justify-content:flex-end;">
        <button
          onclick="cancelBooking(${index})"
          style="
            padding:8px 12px;
            border-radius:10px;
            border:1px solid rgba(224,96,96,.3);
            background:transparent;
            color:#E06060;
            font-family:'Comfortaa',sans-serif;
            font-size:11px;
            cursor:pointer;
          "
        >
          Цуцлах
        </button>
      </div>
    </div>
  `).join('');
}


function closePP(){
  document.getElementById('pp').classList.remove('open');
  document.getElementById('ppOv').classList.remove('open');
  document.body.style.overflow = '';
}
function cancelBooking(index){
  if(index < 0 || index >= bookings.length) return;

  const cancelled = bookings[index];
  const ok = confirm(`"${cancelled.camp}" захиалгыг цуцлах уу?`);
  if(!ok) return;

  bookings.splice(index, 1);
  localStorage.setItem('jim_bookings', JSON.stringify(bookings));
  renderBks();
  showToast('Захиалга цуцлагдлаа');
}

// ─── BOOKING ───────────────────────────
function openBk(name,price){ if(!user){openModal('authModal');showToast('Захиалахын тулд нэвтэрнэ үү');return;} bkCamp=name;bkPrice=price; document.getElementById('bkName').textContent=name; bkStep(1); openModal('bookingModal'); }
function bkStep(n){ for(let i=1;i<=3;i++){document.getElementById('bkS'+i).style.display='none';document.getElementById('bd'+i).classList.remove('on');} document.getElementById('bkS'+n).style.display='block'; for(let i=1;i<=n;i++) document.getElementById('bd'+i).classList.add('on'); if(n===3){const ci=document.getElementById('bkIn').value||'–';const co=document.getElementById('bkOut').value||'–'; document.getElementById('bkSN').textContent=bkCamp; document.getElementById('bkSD').textContent=ci+' → '+co; document.getElementById('bkSP').textContent=document.getElementById('bkPax').value; document.getElementById('bkST').textContent='₮'+bkPrice.toLocaleString();} }
function confirmBk(){ bookings.push({camp:bkCamp,date:document.getElementById('bkIn').value||'Тодорхойгүй',price:bkPrice}); closeModal('bookingModal'); showToast(`"${bkCamp}" захиалга амжилттай! 🎉`); }

// ─── TOAST ─────────────────────────────
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3200); }

// ─── NAV SCROLL ────────────────────────
window.addEventListener('scroll',()=>{ document.getElementById('mainNav').style.background=window.scrollY>80?'rgba(13,13,13,.98)':'rgba(13,13,13,.9)'; });
</script>
